<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACSZ BLOOD LINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #D32F2F; --bg-light: #F8F9FA; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: #e0e0e0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 430px; height: 100vh; background: white; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Splash Screen */
        #page-splash { position: absolute; width: 100%; height: 100%; background: var(--primary-color); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 1000; }
        
        /* Pages */
        .page-view { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .page-view.active { display: block; }
        
        /* Auth Styles */
        .auth-container { display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .form-control { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; color: var(--primary-color); }
        .welcome-card { background: var(--primary-color); color: white; padding: 20px; border-radius: 15px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- ১. স্প্ল্যাশ স্ক্রিন -->
    <div id="page-splash">
        <i class="fa-solid fa-droplet" style="font-size: 60px;"></i>
        <h1 style="margin: 20px 0;">ACSZ BLOOD LINE</h1>
        <p>DEVELOPED BY MOHAMMAD MINHAZ</p>
    </div>

    <!-- ২. লগইন ও নিবন্ধন -->
    <div id="page-auth" class="page-view">
        <div class="auth-container">
            <h2 id="auth-title" style="margin-bottom: 20px; text-align: center;">নিবন্ধন করুন</h2>
            <input type="text" class="form-control" placeholder="আপনার নাম">
            <input type="tel" class="form-control" placeholder="মোবাইল নাম্বার">
            <input type="password" class="form-control" placeholder="পাসওয়ার্ড">
            <button class="btn-main" onclick="navigateTo('home')">নিবন্ধন করুন</button>
            <p style="text-align: center; margin-top: 15px;" onclick="document.getElementById('auth-title').innerText='লগইন'"><u>লগইন করুন</u></p>
        </div>
    </div>

    <!-- ৩. হোম পেজ -->
    <div id="page-home" class="page-view">
        <div class="header">
            <span><i class="fa-solid fa-droplet"></i> ACSZ BLOOD LINE</span>
            <i class="fa-regular fa-bell"></i>
        </div>
        <div class="welcome-card">
            <h3>স্বাগতম!</h3>
            <p>আপনার অ্যাকাউন্টটি সক্রিয় রয়েছে।</p>
        </div>
        <div style="margin-top:20px;">
            <button class="btn-main" onclick="alert('আবেদনের ফর্ম শীঘ্রই আসছে')">রক্তের আবেদন</button>
            <button class="btn-main" style="background:#2E7D32; margin-top:10px;">রক্তদাতা খুঁজুন</button>
        </div>
    </div>
</div>

<script>
    // স্প্ল্যাশ লজিক
    setTimeout(() => {
        document.getElementById('page-splash').style.display = 'none';
        document.getElementById('page-auth').classList.add('active');
    }, 3000);

    function navigateTo(pageId) {
        document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
    }
</script>

</body>
</html>

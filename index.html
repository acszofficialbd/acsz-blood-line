<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACSZ BLOOD LINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #D32F2F; 
            --primary-dark: #B71C1C;
            --accent-green: #2E7D32; 
            --bg-light: #F8F9FA;
            --card-bg: #FFFFFF;
            --text-dark: #212121;
            --text-muted: #666666;
            --tab-inactive: #E0E0E0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: var(--bg-light);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 20px 16px 15px;
            text-align: left;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .sub-header {
            background: var(--card-bg);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ECEFF1;
            flex-shrink: 0;
        }
        .sub-header .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .sub-header .logo-area i {
            color: var(--primary-color);
            font-size: 18px;
        }
        .sub-header .noti-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-dark);
            cursor: pointer;
        }

        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 90px; 
        }

        .page-view {
            display: none;
        }
        .page-view.active {
            display: block;
        }

        .welcome-card {
            background: linear-gradient(135deg, #E53935, #C62828);
            color: white;
            padding: 24px;
            border-radius: 18px;
            margin-bottom: 20px;
            box-shadow: 0 6px 15px rgba(229,57,53,0.25);
            position: relative;
        }
        .welcome-card h3 { font-size: 24px; margin-bottom: 8px; }
        .welcome-card p { font-size: 14px; opacity: 0.9; line-height: 1.5; }

        .action-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-request { background: #FFFFFF; color: var(--primary-color); border: 1.5px solid var(--primary-color); }
        .btn-search { background: var(--primary-color); color: white; }

        .donor-list-banner {
            background: linear-gradient(135deg, #00897B, #00695C);
            color: white;
            padding: 16px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
        }
        .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .grid-card {
            background: var(--card-bg);
            padding: 20px 16px;
            border-radius: 14px;
            border: 1px solid #E0E0E0;
            cursor: pointer;
        }

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACSZ BLOOD LINE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; }
        .page { padding: 20px; display: none; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; }
        button { width: 100%; padding: 14px; background: #D32F2F; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .header { background: #D32F2F; color: white; padding: 20px; text-align: center; font-size: 20px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-weight: bold; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .call-btn { background: #2E7D32; }
    </style>
</head>
<body>

<div class="app">
    <!-- নিবন্ধন ফরম -->
    <div id="reg-page" class="page" style="display: block;">
        <h2>নিবন্ধন করুন</h2>
        <input type="text" placeholder="আপনার সম্পূর্ণ নাম">
        <input type="email" placeholder="ইমেইল এড্রেস">
        <input type="tel" placeholder="মোবাইল নাম্বার">
        <input type="number" placeholder="বয়স (Age)">
        <input type="password" placeholder="নতুন পাসওয়ার্ড">
        <select><option>রক্তের গ্রুপ</option><option>A+</option><option>B+</option></select>
        <select id="district-list"><option>আপনার জেলা সিলেক্ট করুন</option><option>Chattogram</option><option>Dhaka</option><option>Sylhet</option><option>Rajshahi</option></select>
        <button onclick="alert('স্বাগতম!'); document.getElementById('reg-page').style.display='none'; document.getElementById('home-page').style.display='block';">নিবন্ধন সম্পন্ন করুন</button>
    </div>

    <!-- হোম পেজ -->
    <div id="home-page" class="page">
        <div class="header">ACSZ BLOOD LINE</div>
        <div class="grid">
            <div class="card" onclick="alert('রক্তের আবেদনের ফর্ম খুলছে...');">🩸 রক্তের আবেদন</div>
            <div class="card" onclick="alert('রক্তদাতা খুঁজুন...');">🔍 রক্তদাতা খুঁজুন</div>
            <div class="card">📝 My Requests</div>
            <div class="card" onclick="alert('রক্তদানের নিয়ম: সুস্থ ব্যক্তিরা প্রতি ৪ মাস অন্তর রক্ত দিতে পারেন।');">💡 উপকারিতা</div>
            <div class="card" style="grid-column: span 2;" onclick="document.getElementById('home-page').style.display='none'; document.getElementById('volunteer').style.display='block';">🛡️ স্বেচ্ছাসেবক</div>
        </div>
        <div class="nav-bar"><span>হোম</span><span>ডোনার</span><span>+</span><span>ফিড</span><span>প্রোফাইল</span></div>
    </div>

    <!-- স্বেচ্ছাসেবক (ইংলিশ) -->
    <div id="volunteer" class="page">
        <h2>Anowara Cyber Safety Zone</h2>
        <button onclick="window.location.href='https://www.facebook.com/share/17YCHDajei/'">Follow Now Official Page</button>
        <button style="background: #333;" onclick="window.location.href='#'">MOHAMMAD MINHAZ</button>
        <button onclick="document.getElementById('volunteer').style.display='none'; document.getElementById('home-page').style.display='block';">Back</button>
    </div>
</div>

</body>
</html>

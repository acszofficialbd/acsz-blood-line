<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACSZ BLOOD LINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #D32F2F; 
            --primary-dark: #B71C1C;
            --accent-green: #2E7D32; 
            --bg-light: #F8F9FA;
            --card-bg: #FFFFFF;
            --text-dark: #212121;
            --text-muted: #666666;
            --fb-blue: #1877F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .app-container { width: 100%; max-width: 430px; height: 100vh; background: var(--bg-light); position: relative; display: flex; flex-direction: column; overflow: hidden; }

        /* স্ক্রিন স্টাইল */
        #splash-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary-color), var(--primary-dark)); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; transition: opacity 0.5s ease; }
        
        #auth-screen { display: none; flex-direction: column; justify-content: center; padding: 24px; height: 100%; background: var(--card-bg); overflow-y: auto; }
        .auth-header { text-align: center; margin-bottom: 25px; }
        .auth-header i { color: var(--primary-color); font-size: 45px; }
        
        .tab-box { display: flex; margin-bottom: 20px; border-bottom: 2px solid #EEEEEE; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-size: 16px; font-weight: 600; color: var(--text-muted); cursor: pointer; text-align: center; }
        .tab-btn.active { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1.5px solid #E0E0E0; border-radius: 10px; font-size: 14px; }
        
        .submit-btn { width: 100%; padding: 14px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }

        #main-dashboard { display: none; flex-direction: column; height: 100%; }
        .app-header { background: var(--primary-dark); color: white; padding: 20px; font-size: 18px; font-weight: 700; display: flex; justify-content: space-between; }
        .app-content { flex: 1; overflow-y: auto; padding: 16px; }

        .blood-post-card { background: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; border-left: 5px solid var(--primary-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .call-now-btn { background: var(--accent-green); color: white; padding: 8px 12px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600; }

        .volunteer-card { background: var(--card-bg); border-radius: 12px; padding: 16px; margin-top: 20px; border: 1px solid #E0E0E0; text-align: center; }
        .social-link { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; margin-top: 10px; border-radius: 8px; color: white; text-decoration: none; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="splash-screen"><i class="fa-solid fa-heart-pulse" style="font-size:50px;"></i><h2>ACSZ BLOOD LINE</h2><div style="margin-top:20px;" class="spinner"></div></div>

        <div id="auth-screen">
            <div class="auth-header"><i class="fa-solid fa-droplet"></i><h2>ACSZ BLOOD LINE</h2></div>
            <div class="tab-box"><button class="tab-btn active" id="login-tab" onclick="switchTab('login')">লগইন</button><button class="tab-btn" id="reg-tab" onclick="switchTab('reg')">নিবন্ধন</button></div>
            <div id="login-form">
                <div class="form-group"><label>মোবাইল</label><input type="tel" id="login-phone" placeholder="মোবাইল নম্বর"></div>
                <div class="form-group"><label>পাসওয়ার্ড</label><input type="password" id="login-pass" placeholder="পাসওয়ার্ড"></div>
                <button class="submit-btn" onclick="enterApp()">প্রবেশ করুন</button>
            </div>
            <div id="reg-form" style="display: none;">
                <div class="form-group"><label>নাম</label><input type="text" id="reg-name" placeholder="নাম"></div>
                <div class="form-group"><label>মোবাইল</label><input type="tel" id="reg-phone" placeholder="মোবাইল"></div>
                <div class="form-group"><label>রক্তের গ্রুপ</label><select id="reg-blood"><option>A+</option><option>B+</option><option>O+</option><option>AB+</option><option>A-</option><option>B-</option><option>O-</option><option>AB-</option></select></div>
                <div class="form-group"><label>পাসওয়ার্ড</label><input type="password" id="reg-pass" placeholder="পাসওয়ার্ড"></div>
                <button class="submit-btn" onclick="registerUser()">নিবন্ধন করুন</button>
            </div>
        </div>

        <div id="main-dashboard">
            <div class="app-header"><span>ACSZ BLOOD LINE</span><button onclick="location.reload()" style="background:none;border:none;color:white;"><i class="fa-solid fa-right-from-bracket"></i></button></div>
            <div class="app-content">
                <button onclick="showRequestScreen()" style="width:100%; padding:12px; background:var(--primary-color); color:white; border:none; border-radius:10px; font-weight:700; margin-bottom:15px;">রক্ত লাগবে (আবেদন)</button>
                <div id="live-posts-container"></div>
                <div class="volunteer-card">
                    <p style="font-weight:700; color:var(--primary-color);">অ্যাপ নির্মাতা ও পরিচালক</p>
                    <a href="https://www.facebook.com/anowaracybersaftyzone?mibextid=ZbWKwL" style="background:var(--primary-dark);" class="social-link"><i class="fa-brands fa-facebook"></i> Follow Official Page</a>
                    <a href="https://www.facebook.com/moha.narir.priyo?mibextid=ZbWKwL" style="background:var(--fb-blue);" class="social-link"><i class="fa-brands fa-facebook"></i> Follow Developer (MOHAMMAD MINHAZ)</a>
                </div>
            </div>
        </div>

        <div id="request-screen" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:white; padding:20px;">
            <h3>নতুন আবেদন</h3><br>
            <input type="text" id="post-name" placeholder="রোগীর নাম" style="width:100%; padding:10px; margin-bottom:10px;"><br>
            <input type="tel" id="post-phone" placeholder="মোবাইল নম্বর" style="width:100%; padding:10px; margin-bottom:10px;"><br>
            <button class="submit-btn" onclick="submitBloodPost()">পোস্ট করুন</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
        var firebaseConfig = { apiKey: "AIzaSyAJsQSbWNb0pswDL-fBTiCqq2DdNgqy1Uw", authDomain: "acsz-blood-line.firebaseapp.com", databaseURL: "https://acsz-blood-line-default-rtdb.firebaseio.com", projectId: "acsz-blood-line", storageBucket: "acsz-blood-line.firebasestorage.app", messagingSenderId: "1051350416110", appId: "1:1051350416110:web:11cf58d8bbaf56678cd1ff" };
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; document.getElementById('auth-screen').style.display = 'flex'; }, 3000);

        function switchTab(t) {
            document.getElementById('login-tab').classList.toggle('active', t=='login'); document.getElementById('reg-tab').classList.toggle('active', t=='reg');
            document.getElementById('login-form').style.display = t=='login' ? 'block' : 'none'; document.getElementById('reg-form').style.display = t=='reg' ? 'block' : 'none';
        }

        function registerUser() {
            var phone = document.getElementById('reg-phone').value;
            database.ref('users/'+phone).set({name: document.getElementById('reg-name').value, phone: phone});
            alert('সফলভাবে নিবন্ধন হয়েছে!'); enterApp();
        }

        function enterApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-dashboard').style.display = 'flex'; loadPosts(); }

        function showRequestScreen() { document.getElementById('request-screen').style.display = 'block'; }
        
        function submitBloodPost() {
            database.ref('blood_posts').push({patientName: document.getElementById('post-name').value, phone: document.getElementById('post-phone').value});
            alert('পোস্ট হয়েছে!'); document.getElementById('request-screen').style.display = 'none';
        }

        function loadPosts() {
            database.ref('blood_posts').on('value', snap => {
                var c = document.getElementById('live-posts-container'); c.innerHTML = '';
                snap.forEach(s => { 
                    var p = s.val();
                    c.innerHTML += `<div class="blood-post-card"><div><h4>${p.patientName}</h4></div><a href="tel:${p.phone}" class="call-now-btn">কল করুন</a></div>`;
                });
            });
        }
    </script>
</body>
                    </html>
